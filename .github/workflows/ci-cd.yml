name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Backend Validation
  backend-validation:
    name: Backend Build & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pylint flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Validate imports
        run: |
          python -m py_compile backend/main.py

  # Frontend Validation
  frontend-validation:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint -- --max-warnings=0 || true

      - name: Build application
        working-directory: frontend
        run: npm run build

  # Docker Build Validation
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Code Quality Check
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SonarQube Scanner (Optional)
        uses: SonarSource/sonarcloud-github-action@master
        if: |
          github.event_name == 'pull_request' && 
          github.event.pull_request.draft == false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # Security Check
  security-check:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install and run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: NPM Security Audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  # Notification
  success-notification:
    name: CI/CD Pipeline Success
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation, docker-validation]
    if: success()

    steps:
      - name: ✅ All checks passed
        run: echo "CI/CD Pipeline completed successfully!"
